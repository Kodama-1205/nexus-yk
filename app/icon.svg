<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1527"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 外枠のシアングロー -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.35"/>

  <!-- N の左縦線 -->
  <rect x="7" y="7.5" width="3.5" height="17" rx="1" fill="url(#letter)"/>

  <!-- N の右縦線 -->
  <rect x="21.5" y="7.5" width="3.5" height="17" rx="1" fill="url(#letter)"/>

  <!-- N の斜め線 -->
  <polygon points="7,7.5 10.5,7.5 25,24.5 21.5,24.5" fill="url(#letter)"/>
</svg>
